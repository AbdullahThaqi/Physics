<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Ligji i Hukut</title>
</head>
<body>
    <div id="inputContainer">
        <label for="l₀">l₀ (mm):</label>
        <input type="number" id="l₀" placeholder="Gjatësia fillestare" step="0.01" required>
        <br><br>
        <label for="numMeasurements">Numri i matjeve:</label>
        <input type="number" id="numMeasurements" min="1" placeholder="Numri i matjeve">
        <button id="setMeasurementsBtn">Vendos Matjet</button>
    </div>

    <div id="measurementsContainer"></div>

    <button id="calculateBtn" style="display: none;">Kalkulo</button>

    <table id="resultsTable" border="1" style="margin-top: 20px;">
        <tbody id="resultsTableBody">
        </tbody>
    </table>

    <table id="summaryTable" border="1" style="margin-top: 20px;">
        <tbody id="summaryTableBody">
        </tbody>
    </table>

    <div style="width: 80%; margin: 20px auto;">
        <canvas id="chartCanvas"></canvas>
    </div>

    <script src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</html>
